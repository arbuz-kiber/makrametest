<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Побег от Наталии</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; color: white; font-family: Arial; }
  #score { position: fixed; top: 10px; left: 10px; font-size: 20px; }
</style>
</head>
<body>

<div id="score">Очки: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width/2, y: canvas.height/2, r: 15 };
let enemy = { x: 100, y: 100, r: 20 };
let points = [];
let score = 0;

for(let i = 0; i < 5; i++) spawnPoint();

function spawnPoint() {
  points.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: 10
  });
}

// управление
function move(e) {
  let rect = canvas.getBoundingClientRect();
  player.x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  player.y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
}

canvas.addEventListener("mousemove", move);
canvas.addEventListener("touchmove", move);

// расстояние
function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function update() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // движение Наталии (преследует игрока)
  let dx = player.x - enemy.x;
  let dy = player.y - enemy.y;
  let d = Math.hypot(dx, dy);
  enemy.x += dx / d * 2;
  enemy.y += dy / d * 2;

  // рисуем игрока
  ctx.fillStyle = "blue";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
  ctx.fill();

  // рисуем Наталию
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(enemy.x, enemy.y, enemy.r, 0, Math.PI * 2);
  ctx.fill();

  // рисуем поинты
  ctx.fillStyle = "lime";
  points.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();

    if(dist(player, p) < player.r + p.r) {
      score++;
      document.getElementById("score").innerText = "Очки: " + score;
      points.splice(i, 1);
      spawnPoint();
    }
  });

  // проигрыш
  if(dist(player, enemy) < player.r + enemy.r) {
    alert("Тебя поймала Наталия 😈\nОчки: " + score);
    location.reload();
  }

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
